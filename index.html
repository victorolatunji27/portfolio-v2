<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Field</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }

  #scoreboard {
    position: fixed;
    top: 12px;
    left: 12px;
    padding: 8px 14px;
    background: rgba(20, 22, 29, 0.75);
    color: #e8e4d2;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 0.05em;
    border: 1px solid #3a3d47;
    border-radius: 4px;
    z-index: 10;
  }

  #drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 320px;
    max-width: 85vw;
    height: 100%;
    box-sizing: border-box;
    padding: 28px 24px;
    background: rgba(18, 20, 26, 0.94);
    color: #e8e4d2;
    font-family: system-ui, sans-serif;
    border-left: 1px solid #3a3d47;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    overflow-y: auto;
    z-index: 10;
  }
  #drawer.open {
    transform: translateX(0);
  }
  #drawer .drawer-yard {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: #d4af37;
    margin-bottom: 6px;
  }
  #drawer h2 {
    margin: 0 0 4px;
    font-size: 22px;
  }
  #drawer .drawer-meta {
    font-size: 13px;
    color: #a9a49a;
    margin-bottom: 16px;
  }
  #drawer .drawer-body {
    font-size: 14px;
    line-height: 1.5;
  }
  #drawer .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  #drawer .tag {
    padding: 4px 10px;
    background: #23262f;
    border: 1px solid #3a3d47;
    border-radius: 999px;
    font-size: 12px;
  }
  #drawer .links {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  #drawer .links li + li {
    margin-top: 8px;
  }
  #drawer .links a {
    color: #e8e4d2;
    text-decoration: underline;
  }

  #soundToggle {
    position: fixed;
    top: 54px;
    left: 12px;
    padding: 6px 14px;
    background: rgba(20, 22, 29, 0.75);
    color: #e8e4d2;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    border: 1px solid #3a3d47;
    border-radius: 4px;
    cursor: pointer;
    z-index: 10;
  }
  #soundToggle:hover {
    background: rgba(35, 38, 47, 0.9);
  }
</style>
</head>
<body>
<canvas id="field"></canvas>
<div id="scoreboard">&mdash;</div>
<button id="soundToggle" type="button">SOUND: ON</button>
<aside id="drawer">
  <div class="drawer-yard" id="drawerYard"></div>
  <h2 id="drawerTitle"></h2>
  <div class="drawer-meta" id="drawerMeta"></div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>
<script>
  const canvas = document.getElementById('field');
  const ctx = canvas.getContext('2d');

  // Low-resolution offscreen buffer for a pixel-art look.
  const PXS = 3;
  let buf, bctx;

  // Baked, static world image (stadium + field), rebuilt on resize.
  let world, worldCtx;

  // Field geometry, in world units (not screen pixels).
  const FIELD_W = 1920;
  const FIELD_H = 680;
  const END_ZONE_W = 160;
  const PLAY_W = FIELD_W - END_ZONE_W * 2;

  // Stadium geometry wrapping the field.
  const OUTER_MARGIN = 40;
  const STAND_DEPTH = 170;
  const APRON = 40;

  const FIELD_X = OUTER_MARGIN + STAND_DEPTH + APRON;
  const FIELD_Y = OUTER_MARGIN + STAND_DEPTH + APRON;

  const WORLD_W = FIELD_W + FIELD_X * 2;
  const WORLD_H = FIELD_H + FIELD_Y * 2;

  const STAND_TOP = { x: OUTER_MARGIN, y: OUTER_MARGIN, w: WORLD_W - OUTER_MARGIN * 2, h: STAND_DEPTH };
  const STAND_BOTTOM = { x: OUTER_MARGIN, y: WORLD_H - OUTER_MARGIN - STAND_DEPTH, w: WORLD_W - OUTER_MARGIN * 2, h: STAND_DEPTH };
  const STAND_LEFT = { x: OUTER_MARGIN, y: OUTER_MARGIN + STAND_DEPTH, w: STAND_DEPTH, h: WORLD_H - (OUTER_MARGIN + STAND_DEPTH) * 2 };
  const STAND_RIGHT = { x: WORLD_W - OUTER_MARGIN - STAND_DEPTH, y: OUTER_MARGIN + STAND_DEPTH, w: STAND_DEPTH, h: WORLD_H - (OUTER_MARGIN + STAND_DEPTH) * 2 };
  const STANDS = [STAND_TOP, STAND_BOTTOM, STAND_LEFT, STAND_RIGHT];

  // Maps 0..100 yards, measured from the left goal line, to a world x.
  function ydx(yards) {
    return FIELD_X + END_ZONE_W + (yards / 100) * PLAY_W;
  }

  const COLOR_BG = '#14161d';
  const COLOR_STRIPE_A = '#5aa96a';
  const COLOR_STRIPE_B = '#4c9a5d';
  const COLOR_ENDZONE = '#cf3b3b';
  const COLOR_LINE = '#e8e4d2';
  const COLOR_WHITE = '#ffffff';
  const COLOR_STAND = '#23262f';

  const COLOR_HELMET = '#cf3b3b';
  const COLOR_HELMET_STRIPE = '#e8e4d2';
  const COLOR_SKIN = '#8a5a3b';
  const COLOR_FACEMASK = '#8a8a8a';
  const COLOR_JERSEY = '#1a1714';
  const COLOR_BALL = '#5c3b22';
  const COLOR_NAVY = '#1c2b4a';

  const PLAYER_COLORS = {
    helmet: COLOR_HELMET, stripe: COLOR_HELMET_STRIPE, skin: COLOR_SKIN,
    mask: COLOR_FACEMASK, jersey: COLOR_JERSEY, pants: COLOR_WHITE,
  };
  const DEFENDER_COLORS = {
    helmet: COLOR_NAVY, stripe: COLOR_WHITE, skin: COLOR_SKIN,
    mask: COLOR_FACEMASK, jersey: COLOR_WHITE, pants: COLOR_LINE,
  };

  const CROWD_PALETTE = ['#cf3b3b', '#e8e4d2', '#d4af37', '#3b5fcf', '#8a2f2f', '#2f4f8a'];

  const YARD_NUMBERS = [10, 20, 30, 40, 50, 40, 30, 20, 10];

  const CATEGORY_COLORS = {
    about: '#3b5fcf',
    skills: '#d4af37',
    experience: '#2f8a5a',
    project: '#cf3b3b',
    contact: '#e8e4d2',
  };

  // Content stops, zigzagging down the field. Placeholder copy — swap in
  // your own bio, skills, experience, and project details.
  const Z = [
    {
      id: 'about', category: 'about',
      x: FIELD_X + END_ZONE_W / 2, y: FIELD_Y + FIELD_H / 2,
      yard: 'EZ', plate: 'ABOUT',
      title: 'Victor Olatunji',
      meta: 'Computer Science · University of Maryland',
      body: { html: '<p>I build small, fast, playful things for the web — this stadium included. I like JavaScript, canvas rendering, and turning plain data into interfaces that feel alive.</p>' },
    },
    {
      id: 'skill-frontend', category: 'skills',
      x: ydx(10), y: FIELD_Y + FIELD_H * 0.34,
      yard: '10', plate: 'SKILLS',
      title: 'Frontend',
      meta: 'Languages & UI',
      body: { tags: ['JavaScript', 'HTML/CSS', 'React', 'Canvas API'] },
    },
    {
      id: 'skill-backend', category: 'skills',
      x: ydx(20), y: FIELD_Y + FIELD_H * 0.66,
      yard: '20', plate: 'SKILLS',
      title: 'Backend & Tools',
      meta: 'Systems & workflow',
      body: { tags: ['Node.js', 'Python', 'Git', 'SQL'] },
    },
    {
      id: 'exp-umd', category: 'experience',
      x: ydx(30), y: FIELD_Y + FIELD_H * 0.34,
      yard: '30', plate: 'EXP',
      title: 'University of Maryland',
      meta: 'B.S. Computer Science',
      body: { html: '<p>Coursework spanning data structures, algorithms, and full-stack web development.</p>' },
    },
    {
      id: 'exp-codepath', category: 'experience',
      x: ydx(40), y: FIELD_Y + FIELD_H * 0.66,
      yard: '40', plate: 'EXP',
      title: 'CodePath TIP102 / WEB102',
      meta: 'Technical interview prep & full-stack track',
      body: { html: '<p>Advanced data structures and technical interview practice alongside a full-stack web development track.</p>' },
    },
    {
      id: 'proj-lectureloop', category: 'project',
      x: ydx(50), y: FIELD_Y + FIELD_H * 0.34,
      yard: '50', plate: 'PROJ',
      title: 'LectureLoop',
      meta: 'Web app',
      body: { links: [{ label: 'GitHub', href: 'https://github.com/victorolatunji27/lectureloop' }] },
    },
    {
      id: 'proj-echosense', category: 'project',
      x: ydx(60), y: FIELD_Y + FIELD_H * 0.66,
      yard: '60', plate: 'PROJ',
      title: 'EchoSense',
      meta: 'Web app',
      body: { links: [{ label: 'GitHub', href: 'https://github.com/victorolatunji27/echosense' }] },
    },
    {
      id: 'proj-volterra', category: 'project',
      x: ydx(70), y: FIELD_Y + FIELD_H * 0.34,
      yard: '70', plate: 'PROJ',
      title: 'Volterra AI',
      meta: 'Web app',
      body: { links: [{ label: 'GitHub', href: 'https://github.com/victorolatunji27/volterra-ai' }] },
    },
    {
      id: 'proj-portfolio', category: 'project',
      x: ydx(80), y: FIELD_Y + FIELD_H * 0.66,
      yard: '80', plate: 'PROJ',
      title: 'This Stadium',
      meta: 'Canvas · vanilla JS',
      body: { links: [{ label: 'GitHub', href: 'https://github.com/victorolatunji27/portfolio-v2' }] },
    },
    {
      id: 'contact', category: 'contact',
      x: FIELD_X + FIELD_W - END_ZONE_W / 2, y: FIELD_Y + FIELD_H / 2,
      yard: 'EZ', plate: 'CONTACT',
      title: "Let's talk",
      meta: 'Reach out',
      body: {
        links: [
          { label: 'Email', href: 'mailto:volatunj@terpmail.umd.edu' },
          { label: 'GitHub', href: 'https://github.com/victorolatunji27' },
        ],
      },
    },
  ];

  // Knockdown state for each defender: ramps 0..1 while active, decays otherwise.
  Z.forEach((entry) => {
    entry.knock = 0;
    entry._knockedDown = false;
  });

  function drawField(c) {
    // Mowing stripes.
    const stripeCount = 22;
    const stripeW = FIELD_W / stripeCount;
    for (let i = 0; i < stripeCount; i++) {
      c.fillStyle = i % 2 === 0 ? COLOR_STRIPE_A : COLOR_STRIPE_B;
      c.fillRect(FIELD_X + i * stripeW, FIELD_Y, stripeW, FIELD_H);
    }

    // End zones.
    c.fillStyle = COLOR_ENDZONE;
    c.fillRect(FIELD_X, FIELD_Y, END_ZONE_W, FIELD_H);
    c.fillRect(FIELD_X + FIELD_W - END_ZONE_W, FIELD_Y, END_ZONE_W, FIELD_H);

    // Sideline border.
    c.strokeStyle = COLOR_WHITE;
    c.lineWidth = 4;
    c.strokeRect(FIELD_X + 2, FIELD_Y + 2, FIELD_W - 4, FIELD_H - 4);

    // Goal lines.
    c.beginPath();
    c.moveTo(ydx(0), FIELD_Y);
    c.lineTo(ydx(0), FIELD_Y + FIELD_H);
    c.moveTo(ydx(100), FIELD_Y);
    c.lineTo(ydx(100), FIELD_Y + FIELD_H);
    c.stroke();

    // Yard lines every 5 yards.
    c.strokeStyle = COLOR_LINE;
    c.lineWidth = 2;
    for (let yards = 5; yards < 100; yards += 5) {
      const x = ydx(yards);
      c.beginPath();
      c.moveTo(x, FIELD_Y);
      c.lineTo(x, FIELD_Y + FIELD_H);
      c.stroke();
    }

    // Yard numbers, near the top and bottom.
    c.fillStyle = COLOR_WHITE;
    c.font = 'bold 40px sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    YARD_NUMBERS.forEach((num, i) => {
      const x = ydx((i + 1) * 10);
      c.fillText(String(num), x, FIELD_Y + 60);
      c.fillText(String(num), x, FIELD_Y + FIELD_H - 60);
    });

    // Hash marks: short ticks every yard at ~34% and ~66% down the field.
    c.strokeStyle = COLOR_LINE;
    c.lineWidth = 2;
    const hashY1 = FIELD_Y + FIELD_H * 0.34;
    const hashY2 = FIELD_Y + FIELD_H * 0.66;
    const hashLen = 10;
    for (let yards = 0; yards <= 100; yards++) {
      const x = ydx(yards);
      c.beginPath();
      c.moveTo(x, hashY1 - hashLen / 2);
      c.lineTo(x, hashY1 + hashLen / 2);
      c.moveTo(x, hashY2 - hashLen / 2);
      c.lineTo(x, hashY2 + hashLen / 2);
      c.stroke();
    }
  }

  // Dense crowd of small pixel blocks, skipping some cells for aisles
  // and empty seats.
  function paintCrowd(rect) {
    const cell = 8;
    const cols = Math.floor(rect.w / cell);
    const rows = Math.floor(rect.h / cell);
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        if (col % 9 === 4 || row % 9 === 4) continue; // aisles
        if (Math.random() < 0.12) continue; // empty seats
        worldCtx.fillStyle = CROWD_PALETTE[Math.floor(Math.random() * CROWD_PALETTE.length)];
        worldCtx.fillRect(rect.x + col * cell, rect.y + row * cell, cell - 1, cell - 1);
      }
    }
  }

  function drawBanner(x, y, w, h, text) {
    worldCtx.fillStyle = '#12141a';
    worldCtx.fillRect(x, y, w, h);
    worldCtx.strokeStyle = COLOR_WHITE;
    worldCtx.lineWidth = 1;
    worldCtx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    worldCtx.fillStyle = COLOR_WHITE;
    worldCtx.font = 'bold 14px sans-serif';
    worldCtx.textAlign = 'center';
    worldCtx.textBaseline = 'middle';
    worldCtx.fillText(text, x + w / 2, y + h / 2);
  }

  function drawBanners() {
    const bannerW = 340;
    const bannerH = 22;
    const cx = WORLD_W / 2;
    const topY = OUTER_MARGIN + STAND_DEPTH + (APRON - bannerH) / 2;
    const bottomY = FIELD_Y + FIELD_H + (APRON - bannerH) / 2;

    drawBanner(cx - bannerW / 2, topY, bannerW, bannerH, 'PORTFOLIO-V2');
    drawBanner(cx - bannerW / 2, bottomY, bannerW, bannerH, 'VICTOROLATUNJI27');
  }

  function buildWorld() {
    world = document.createElement('canvas');
    world.width = WORLD_W;
    world.height = WORLD_H;
    worldCtx = world.getContext('2d');
    worldCtx.imageSmoothingEnabled = false;

    // Dark background.
    worldCtx.fillStyle = COLOR_BG;
    worldCtx.fillRect(0, 0, WORLD_W, WORLD_H);

    // Stands and crowd.
    STANDS.forEach((rect) => {
      worldCtx.fillStyle = COLOR_STAND;
      worldCtx.fillRect(rect.x, rect.y, rect.w, rect.h);
      paintCrowd(rect);
    });

    // Field, baked on top.
    drawField(worldCtx);

    // Banners on the inner railings.
    drawBanners();
  }

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    buf = document.createElement('canvas');
    buf.width = Math.ceil(window.innerWidth / PXS);
    buf.height = Math.ceil(window.innerHeight / PXS);
    bctx = buf.getContext('2d');
    bctx.imageSmoothingEnabled = false;

    buildWorld();
  }

  // Player.
  const PLAYER_W = 24;
  const PLAYER_H = 32;
  const WALK_RATE = 6;

  const P = {
    x: FIELD_X + FIELD_W / 2,
    y: FIELD_Y + FIELD_H / 2,
    speed: 320,
    face: 1,
    moving: false,
    animTime: 0,
  };

  // Camera: world-space top-left corner of the visible viewport.
  const CAM_EASE_RATE = 6;
  const cam = { x: 0, y: 0 };

  function clamp(v, lo, hi) {
    return Math.min(Math.max(v, lo), hi);
  }

  // Held-key tracking for WASD and arrow keys.
  const keys = {};
  const TRACKED_KEYS = new Set([
    'KeyW', 'KeyA', 'KeyS', 'KeyD',
    'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
  ]);
  window.addEventListener('keydown', (e) => {
    if (TRACKED_KEYS.has(e.code)) {
      keys[e.code] = true;
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (TRACKED_KEYS.has(e.code)) {
      keys[e.code] = false;
      e.preventDefault();
    }
  });

  // Web Audio chiptune: square-wave blips, a low thud, and a jingle.
  let audioCtx = null;
  let soundEnabled = true;

  function unlockAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } else if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    window.removeEventListener('click', unlockAudio);
    window.removeEventListener('keydown', unlockAudio);
  }
  window.addEventListener('click', unlockAudio);
  window.addEventListener('keydown', unlockAudio);

  function playTone(freq, duration, type, peakGain, delay) {
    if (!soundEnabled || !audioCtx) return;
    const t0 = audioCtx.currentTime + (delay || 0);
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(peakGain, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.02);
  }

  function playBlip() {
    playTone(880, 0.08, 'square', 0.15);
  }

  function playThud() {
    playTone(90, 0.18, 'sine', 0.3);
  }

  function playJingle() {
    const notes = [523.25, 659.25, 784.0, 1046.5, 1318.5];
    notes.forEach((freq, i) => playTone(freq, 0.12, 'square', 0.12, i * 0.09));
  }

  const soundToggleEl = document.getElementById('soundToggle');
  soundToggleEl.addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    soundToggleEl.textContent = 'SOUND: ' + (soundEnabled ? 'ON' : 'OFF');
  });

  // Proximity detection and the DOM drawer/scoreboard it drives.
  const PROXIMITY_RADIUS = 94;
  let activeId = null;

  const drawerEl = document.getElementById('drawer');
  const drawerYardEl = document.getElementById('drawerYard');
  const drawerTitleEl = document.getElementById('drawerTitle');
  const drawerMetaEl = document.getElementById('drawerMeta');
  const drawerBodyEl = document.getElementById('drawerBody');
  const scoreboardEl = document.getElementById('scoreboard');

  function renderBody(body) {
    if (body.tags) {
      return '<div class="tags">' + body.tags.map((t) => `<span class="tag">${t}</span>`).join('') + '</div>';
    }
    if (body.links) {
      return '<ul class="links">' + body.links.map((l) => `<li><a href="${l.href}" target="_blank" rel="noopener">${l.label}</a></li>`).join('') + '</ul>';
    }
    return body.html || '';
  }

  function findNearest() {
    let nearest = null;
    let nearestDist = Infinity;
    for (const entry of Z) {
      const dist = Math.hypot(entry.x - P.x, entry.y - P.y);
      if (dist < nearestDist) {
        nearestDist = dist;
        nearest = entry;
      }
    }
    return nearestDist <= PROXIMITY_RADIUS ? nearest : null;
  }

  function setActiveEntry(entry) {
    if (!entry) {
      drawerEl.classList.remove('open');
      scoreboardEl.textContent = '—';
      return;
    }
    drawerYardEl.textContent = entry.plate + (entry.yard ? ' · YD ' + entry.yard : '');
    drawerTitleEl.textContent = entry.title;
    drawerMetaEl.textContent = entry.meta;
    drawerBodyEl.innerHTML = renderBody(entry.body);
    drawerEl.classList.add('open');
    scoreboardEl.textContent = entry.plate + ' — ' + entry.title;

    playBlip();
    if (entry.category === 'project' || entry.category === 'contact') {
      playJingle();
    }
  }

  // Draws one sprite centered on the current bctx origin (0, 0): a helmet,
  // jersey, arms, and legs built from filled rectangles.
  function drawCharacterBody(face, moving, animTime, colors, opts) {
    const top = -PLAYER_H / 2;

    const helmetH = 8;
    const jerseyH = 12;
    const legsH = PLAYER_H - helmetH - jerseyH;
    const helmetTop = top;
    const jerseyTop = top + helmetH;
    const legsTop = top + helmetH + jerseyH;

    // Soft shadow under the sprite.
    bctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
    bctx.fillRect(-9, top + PLAYER_H, 18, 4);

    // Legs: two-frame walk animation, still when not moving.
    const legW = 6;
    const legGap = 2;
    const legsLeft = -(legW * 2 + legGap) / 2;
    let leadLift = 0;
    let trailLift = 0;
    if (moving) {
      const phase = Math.floor(animTime * WALK_RATE) % 2;
      leadLift = phase === 0 ? 3 : 0;
      trailLift = phase === 0 ? 0 : 3;
    }
    bctx.fillStyle = colors.pants;
    bctx.fillRect(legsLeft, legsTop + leadLift, legW, legsH - leadLift);
    bctx.fillRect(legsLeft + legW + legGap, legsTop + trailLift, legW, legsH - trailLift);

    // Arms.
    const armW = 4;
    const jerseyW = 14;
    const jerseyLeft = -jerseyW / 2;
    bctx.fillStyle = colors.skin;
    bctx.fillRect(jerseyLeft - armW, jerseyTop + 2, armW, jerseyH - 4);
    bctx.fillRect(jerseyLeft + jerseyW, jerseyTop + 2, armW, jerseyH - 4);

    // Jersey, with an optional number.
    bctx.fillStyle = colors.jersey;
    bctx.fillRect(jerseyLeft, jerseyTop, jerseyW, jerseyH);
    if (opts.number) {
      bctx.fillStyle = colors.jerseyText || COLOR_WHITE;
      bctx.font = 'bold 6px sans-serif';
      bctx.textAlign = 'center';
      bctx.textBaseline = 'middle';
      bctx.fillText(opts.number, 0, jerseyTop + jerseyH / 2 + 1);
    }

    // Football tucked under the front arm, on the facing side.
    if (opts.ball) {
      const ballSize = 4;
      const ballY = jerseyTop + jerseyH - ballSize - 1;
      const ballX = face === 1 ? jerseyLeft + jerseyW - 2 : jerseyLeft - ballSize + 2;
      bctx.fillStyle = COLOR_BALL;
      bctx.fillRect(ballX, ballY, ballSize, ballSize);
    }

    // Helmet with a stripe and face.
    const helmetW = 12;
    const helmetLeft = -helmetW / 2;
    bctx.fillStyle = colors.helmet;
    bctx.fillRect(helmetLeft, helmetTop, helmetW, helmetH);
    bctx.fillStyle = colors.stripe;
    bctx.fillRect(helmetLeft, helmetTop + helmetH / 2 - 1, helmetW, 2);

    const faceW = 5;
    const faceX = face === 1 ? helmetLeft + helmetW - faceW : helmetLeft;
    bctx.fillStyle = colors.skin;
    bctx.fillRect(faceX, helmetTop + 2, faceW, helmetH - 3);

    // Facemask, on the facing side.
    const maskW = 2;
    const maskX = face === 1 ? helmetLeft + helmetW : helmetLeft - maskW;
    bctx.fillStyle = colors.mask;
    bctx.fillRect(maskX, helmetTop + 3, maskW, helmetH - 4);
  }

  function drawPlayer() {
    bctx.save();
    bctx.translate(P.x, P.y);
    drawCharacterBody(P.face, P.moving, P.animTime, PLAYER_COLORS, { ball: true, number: '29' });
    bctx.restore();
  }

  // Knockdown tuning: how fast knock ramps up/decays, how far a defender is
  // pushed away, how high it hops, and how far it rotates as knock goes 0..1.
  const KNOCK_RAMP_RATE = 1 / 0.5;
  const KNOCK_DECAY_RATE = 1 / 0.9;
  const KNOCK_PUSH_DIST = 14;
  const KNOCK_HOP_HEIGHT = 10;
  const KNOCK_ROTATION = 1.3;
  const POW_MIN = 0.2;
  const POW_MAX = 0.85;

  function drawDefender(entry) {
    const knock = entry.knock;
    const awayX = entry.x - P.x;
    const awayY = entry.y - P.y;
    const awayLen = Math.hypot(awayX, awayY) || 1;
    const pushDist = knock * KNOCK_PUSH_DIST;
    const px = entry.x + (awayX / awayLen) * pushDist;
    const py = entry.y + (awayY / awayLen) * pushDist;
    const hop = Math.sin(knock * Math.PI) * KNOCK_HOP_HEIGHT;
    const face = P.x >= entry.x ? 1 : -1;
    const rotation = -face * knock * KNOCK_ROTATION;

    bctx.save();
    bctx.translate(px, py - hop);
    bctx.rotate(rotation);
    drawCharacterBody(face, false, 0, DEFENDER_COLORS, {});
    bctx.restore();
  }

  // Crisp name-plate overlay, drawn on the main (full-resolution) canvas —
  // not the low-res pixel buffer — so the text stays sharp.
  const PLATE_FONT = "bold 13px 'Courier New', monospace";

  function worldToScreen(x, y) {
    return { x: (x - cam.x) * PXS, y: (y - cam.y) * PXS };
  }

  function drawPlate(entry) {
    const isActive = entry.id === activeId;
    const pos = worldToScreen(entry.x, entry.y - (PLAYER_H / 2 + 14));
    if (pos.x < -100 || pos.x > canvas.width + 100 || pos.y < -40 || pos.y > canvas.height + 40) return;

    const label = entry.yard === 'EZ' ? entry.plate : entry.plate + ' ' + entry.yard;
    ctx.font = PLATE_FONT;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const textW = ctx.measureText(label).width;
    const boxW = textW + 16;
    const boxH = 18;
    const sx = Math.round(pos.x);
    const sy = Math.round(pos.y);

    ctx.fillStyle = isActive ? 'rgba(20, 22, 29, 0.85)' : 'rgba(20, 22, 29, 0.55)';
    ctx.fillRect(sx - boxW / 2, sy - boxH / 2, boxW, boxH);
    ctx.strokeStyle = isActive ? (CATEGORY_COLORS[entry.category] || '#f2c744') : 'rgba(201, 197, 186, 0.4)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(sx - boxW / 2 + 0.5, sy - boxH / 2 + 0.5, boxW - 1, boxH - 1);

    ctx.fillStyle = isActive ? '#ffffff' : 'rgba(232, 228, 210, 0.7)';
    ctx.fillText(label, sx, sy + 1);
  }

  function drawPow(entry) {
    if (entry.knock <= POW_MIN || entry.knock >= POW_MAX) return;
    const pos = worldToScreen(entry.x, entry.y - (PLAYER_H / 2 + 34));

    ctx.save();
    ctx.translate(Math.round(pos.x), Math.round(pos.y));
    ctx.rotate(-0.15);
    ctx.font = "bold 20px 'Courier New', monospace";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#1a1714';
    ctx.lineWidth = 3;
    ctx.strokeText('POW!', 0, 0);
    ctx.fillStyle = '#f2c744';
    ctx.fillText('POW!', 0, 0);
    ctx.restore();
  }

  function drawOverlay() {
    Z.forEach(drawPlate);
    Z.forEach(drawPow);
  }

  function update(dt) {
    let dx = 0;
    let dy = 0;
    if (keys.KeyA || keys.ArrowLeft) dx -= 1;
    if (keys.KeyD || keys.ArrowRight) dx += 1;
    if (keys.KeyW || keys.ArrowUp) dy -= 1;
    if (keys.KeyS || keys.ArrowDown) dy += 1;

    if (dx !== 0 || dy !== 0) {
      const len = Math.hypot(dx, dy);
      dx /= len;
      dy /= len;
    }

    P.x += dx * P.speed * dt;
    P.y += dy * P.speed * dt;

    if (dx > 0) P.face = 1;
    else if (dx < 0) P.face = -1;

    P.moving = dx !== 0 || dy !== 0;
    P.animTime = P.moving ? P.animTime + dt : 0;

    P.x = clamp(P.x, FIELD_X + PLAYER_W / 2, FIELD_X + FIELD_W - PLAYER_W / 2);
    P.y = clamp(P.y, FIELD_Y + PLAYER_H / 2, FIELD_Y + FIELD_H - PLAYER_H / 2);

    // Ease the camera toward centering on the player.
    const targetX = P.x - buf.width / 2;
    const targetY = P.y - buf.height / 2;
    const ease = 1 - Math.exp(-CAM_EASE_RATE * dt);
    cam.x += (targetX - cam.x) * ease;
    cam.y += (targetY - cam.y) * ease;

    // Clamp so the camera never shows past the world edges.
    cam.x = buf.width >= WORLD_W
      ? (WORLD_W - buf.width) / 2
      : clamp(cam.x, 0, WORLD_W - buf.width);
    cam.y = buf.height >= WORLD_H
      ? (WORLD_H - buf.height) / 2
      : clamp(cam.y, 0, WORLD_H - buf.height);

    // Proximity detection: open/update the drawer when the nearest stop changes.
    const nearest = findNearest();
    const nearestId = nearest ? nearest.id : null;
    if (nearestId !== activeId) {
      activeId = nearestId;
      setActiveEntry(nearest);
    }

    // Knockdown: ramp the active defender's knock toward 1, decay the rest.
    Z.forEach((entry) => {
      const target = entry.id === activeId ? 1 : 0;
      const rate = target === 1 ? KNOCK_RAMP_RATE : KNOCK_DECAY_RATE;
      if (entry.knock < target) {
        entry.knock = Math.min(target, entry.knock + rate * dt);
      } else if (entry.knock > target) {
        entry.knock = Math.max(target, entry.knock - rate * dt);
      }

      if (entry.knock >= 0.999 && !entry._knockedDown) {
        entry._knockedDown = true;
        playThud();
      } else if (entry.knock < 0.05) {
        entry._knockedDown = false;
      }
    });
  }

  function render(dt) {
    bctx.fillStyle = COLOR_BG;
    bctx.fillRect(0, 0, buf.width, buf.height);

    bctx.save();
    bctx.translate(-cam.x, -cam.y);
    bctx.drawImage(world, 0, 0);
    Z.forEach(drawDefender);
    drawPlayer();
    bctx.restore();

    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(buf, 0, 0, buf.width * PXS, buf.height * PXS);

    drawOverlay();
  }

  window.addEventListener('resize', resize);
  resize();

  let lastTime = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    update(dt);
    render(dt);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
