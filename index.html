<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Field</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="field"></canvas>
<script>
  const canvas = document.getElementById('field');
  const ctx = canvas.getContext('2d');

  // Low-resolution offscreen buffer for a pixel-art look.
  const PXS = 3;
  let buf, bctx;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    buf = document.createElement('canvas');
    buf.width = Math.ceil(window.innerWidth / PXS);
    buf.height = Math.ceil(window.innerHeight / PXS);
    bctx = buf.getContext('2d');
    bctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', resize);
  resize();

  // Field geometry, in world units (not screen pixels).
  const WORLD_W = 1920;
  const WORLD_H = 680;
  const END_ZONE_W = 160;
  const PLAY_W = WORLD_W - END_ZONE_W * 2;

  // Maps 0..100 yards, measured from the left goal line, to a world x.
  function ydx(yards) {
    return END_ZONE_W + (yards / 100) * PLAY_W;
  }

  const COLOR_BG = '#14161d';
  const COLOR_STRIPE_A = '#5aa96a';
  const COLOR_STRIPE_B = '#4c9a5d';
  const COLOR_ENDZONE = '#cf3b3b';
  const COLOR_LINE = '#e8e4d2';
  const COLOR_WHITE = '#ffffff';

  const YARD_NUMBERS = [10, 20, 30, 40, 50, 40, 30, 20, 10];

  // Player.
  const PLAYER_W = 20;
  const PLAYER_H = 32;
  const COLOR_PLAYER = '#f2c744';

  const P = {
    x: WORLD_W / 2,
    y: WORLD_H / 2,
    speed: 320,
    face: 1,
  };

  // Camera: world-space top-left corner of the visible viewport.
  const CAM_EASE_RATE = 6;
  const cam = { x: 0, y: 0 };

  function clamp(v, lo, hi) {
    return Math.min(Math.max(v, lo), hi);
  }

  // Held-key tracking for WASD and arrow keys.
  const keys = {};
  const TRACKED_KEYS = new Set([
    'KeyW', 'KeyA', 'KeyS', 'KeyD',
    'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
  ]);
  window.addEventListener('keydown', (e) => {
    if (TRACKED_KEYS.has(e.code)) {
      keys[e.code] = true;
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (TRACKED_KEYS.has(e.code)) {
      keys[e.code] = false;
      e.preventDefault();
    }
  });

  function drawField() {
    // Mowing stripes.
    const stripeCount = 22;
    const stripeW = WORLD_W / stripeCount;
    for (let i = 0; i < stripeCount; i++) {
      bctx.fillStyle = i % 2 === 0 ? COLOR_STRIPE_A : COLOR_STRIPE_B;
      bctx.fillRect(i * stripeW, 0, stripeW, WORLD_H);
    }

    // End zones.
    bctx.fillStyle = COLOR_ENDZONE;
    bctx.fillRect(0, 0, END_ZONE_W, WORLD_H);
    bctx.fillRect(WORLD_W - END_ZONE_W, 0, END_ZONE_W, WORLD_H);

    // Sideline border.
    bctx.strokeStyle = COLOR_WHITE;
    bctx.lineWidth = 4;
    bctx.strokeRect(2, 2, WORLD_W - 4, WORLD_H - 4);

    // Goal lines.
    bctx.beginPath();
    bctx.moveTo(ydx(0), 0);
    bctx.lineTo(ydx(0), WORLD_H);
    bctx.moveTo(ydx(100), 0);
    bctx.lineTo(ydx(100), WORLD_H);
    bctx.stroke();

    // Yard lines every 5 yards.
    bctx.strokeStyle = COLOR_LINE;
    bctx.lineWidth = 2;
    for (let yards = 5; yards < 100; yards += 5) {
      const x = ydx(yards);
      bctx.beginPath();
      bctx.moveTo(x, 0);
      bctx.lineTo(x, WORLD_H);
      bctx.stroke();
    }

    // Yard numbers, near the top and bottom.
    bctx.fillStyle = COLOR_WHITE;
    bctx.font = 'bold 40px sans-serif';
    bctx.textAlign = 'center';
    bctx.textBaseline = 'middle';
    YARD_NUMBERS.forEach((num, i) => {
      const x = ydx((i + 1) * 10);
      bctx.fillText(String(num), x, 60);
      bctx.fillText(String(num), x, WORLD_H - 60);
    });

    // Hash marks: short ticks every yard at ~34% and ~66% down the field.
    bctx.strokeStyle = COLOR_LINE;
    bctx.lineWidth = 2;
    const hashY1 = WORLD_H * 0.34;
    const hashY2 = WORLD_H * 0.66;
    const hashLen = 10;
    for (let yards = 0; yards <= 100; yards++) {
      const x = ydx(yards);
      bctx.beginPath();
      bctx.moveTo(x, hashY1 - hashLen / 2);
      bctx.lineTo(x, hashY1 + hashLen / 2);
      bctx.moveTo(x, hashY2 - hashLen / 2);
      bctx.lineTo(x, hashY2 + hashLen / 2);
      bctx.stroke();
    }
  }

  function drawPlayer() {
    bctx.fillStyle = COLOR_PLAYER;
    bctx.fillRect(P.x - PLAYER_W / 2, P.y - PLAYER_H / 2, PLAYER_W, PLAYER_H);
  }

  function update(dt) {
    let dx = 0;
    let dy = 0;
    if (keys.KeyA || keys.ArrowLeft) dx -= 1;
    if (keys.KeyD || keys.ArrowRight) dx += 1;
    if (keys.KeyW || keys.ArrowUp) dy -= 1;
    if (keys.KeyS || keys.ArrowDown) dy += 1;

    if (dx !== 0 || dy !== 0) {
      const len = Math.hypot(dx, dy);
      dx /= len;
      dy /= len;
    }

    P.x += dx * P.speed * dt;
    P.y += dy * P.speed * dt;

    if (dx > 0) P.face = 1;
    else if (dx < 0) P.face = -1;

    P.x = clamp(P.x, PLAYER_W / 2, WORLD_W - PLAYER_W / 2);
    P.y = clamp(P.y, PLAYER_H / 2, WORLD_H - PLAYER_H / 2);

    // Ease the camera toward centering on the player.
    const targetX = P.x - buf.width / 2;
    const targetY = P.y - buf.height / 2;
    const ease = 1 - Math.exp(-CAM_EASE_RATE * dt);
    cam.x += (targetX - cam.x) * ease;
    cam.y += (targetY - cam.y) * ease;

    // Clamp so the camera never shows past the world edges.
    cam.x = buf.width >= WORLD_W
      ? (WORLD_W - buf.width) / 2
      : clamp(cam.x, 0, WORLD_W - buf.width);
    cam.y = buf.height >= WORLD_H
      ? (WORLD_H - buf.height) / 2
      : clamp(cam.y, 0, WORLD_H - buf.height);
  }

  function render(dt) {
    bctx.fillStyle = COLOR_BG;
    bctx.fillRect(0, 0, buf.width, buf.height);

    bctx.save();
    bctx.translate(-cam.x, -cam.y);
    drawField();
    drawPlayer();
    bctx.restore();

    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(buf, 0, 0, buf.width * PXS, buf.height * PXS);
  }

  let lastTime = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    update(dt);
    render(dt);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
